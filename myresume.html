<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resume</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        /* Full-page resume image */
        .resume {
            width: 100%;
            height: 100vh;
            object-fit: cover; /* makes it fill screen nicely */
        }

        /* Back button */
        .home-link {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 8px;
            font-family: Arial, sans-serif;
        }

        .home-link:hover {
            background: rgba(0,0,0,0.8);
        }
    </style>
</head>

<body>

    <!-- Back to home -->
    <a class="home-link" href="index.html">← Back to Home</a>

    <!-- Resume image -->
    <img class="resume" src="images/resume.jpg" alt="My Resume">

</body>
</html>
