<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ghost Hall Chase</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(#2b2b5e, #0b0b1a);
    color: white;
    text-align: center;
}

/* Retro header */
h1 {
    margin-top: 20px;
    font-size: 2.5rem;
    text-shadow: 3px 3px black;
}

/* Character select */
#selectScreen {
    margin-top: 40px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1rem;
}

.charBtn {
    background: #ffcc00;
}

.charBtn:hover {
    background: #ffd84d;
}

/* Game board */
#gameArea {
    display: none;
    margin-top: 20px;
}

#board {
    display: grid;
    grid-template-columns: repeat(10, 40px);
    grid-template-rows: repeat(10, 40px);
    justify-content: center;
    gap: 2px;
    margin-top: 20px;
}

.cell {
    width: 40px;
    height: 40px;
    background: #1f1f3d;
    border-radius: 5px;
}

.wall {
    background: #444;
}

.player {
    background: gold;
}

.ghost {
    background: red;
}

.exit {
    background: limegreen;
}

/* HUD */
#hud {
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>👻 Ghost Hall Chase</h1>

<!-- Character Select -->
<div id="selectScreen">
    <h2>Choose Your Character</h2>
    <button class="charBtn" onclick="startGame('Toadette')">Toadette</button>
    <button class="charBtn" onclick="startGame('Yoshi')">Yoshi</button>
    <button class="charBtn" onclick="startGame('Birdo')">Birdo</button>
    <button class="charBtn" onclick="startGame('Peach')">Peach</button>
    <button class="charBtn" onclick="startGame('Mario')">Mario</button>
    <button class="charBtn" onclick="startGame('DK')">Donkey Kong</button>
    <button class="charBtn" onclick="startGame('Blooper')">Blooper</button>
</div>

<!-- Game -->
<div id="gameArea">
    <h2 id="playerName"></h2>
    <div id="hud">Use Arrow Keys to reach the green exit!</div>
    <div id="board"></div>
</div>

<script>
let player = {x: 0, y: 0};
let ghost = {x: 9, y: 9};
let exit = {x: 9, y: 0};
let currentPlayer = "";
let interval;

// simple walls
const walls = [
    "1,0","1,1","1,2","3,4","4,4","5,4","6,7","7,7","8,7"
];

function startGame(name) {
    currentPlayer = name;

    document.getElementById("selectScreen").style.display = "none";
    document.getElementById("gameArea").style.display = "block";
    document.getElementById("playerName").innerText = "Playing as " + name;

    player = {x: 0, y: 9};
    ghost = {x: 9, y: 0};

    drawBoard();

    document.addEventListener("keydown", movePlayer);

    interval = setInterval(moveGhost, 700);
}

function drawBoard() {
    const board = document.getElementById("board");
    board.innerHTML = "";

    for (let y = 0; y < 10; y++) {
        for (let x = 0; x < 10; x++) {

            let cell = document.createElement("div");
            cell.classList.add("cell");

            if (walls.includes(x + "," + y)) cell.classList.add("wall");

            if (x === player.x && y === player.y) cell.classList.add("player");
            if (x === ghost.x && y === ghost.y) cell.classList.add("ghost");
            if (x === exit.x && y === exit.y) cell.classList.add("exit");

            board.appendChild(cell);
        }
    }
}

function movePlayer(e) {
    let nx = player.x;
    let ny = player.y;

    if (e.key === "ArrowUp") ny--;
    if (e.key === "ArrowDown") ny++;
    if (e.key === "ArrowLeft") nx--;
    if (e.key === "ArrowRight") nx++;

    if (nx < 0 || ny < 0 || nx > 9 || ny > 9) return;
    if (walls.includes(nx + "," + ny)) return;

    player.x = nx;
    player.y = ny;

    checkWin();
    drawBoard();
}

function moveGhost() {
    if (ghost.x < player.x) ghost.x++;
    else if (ghost.x > player.x) ghost.x--;

    if (ghost.y < player.y) ghost.y++;
    else if (ghost.y > player.y) ghost.y--;

    checkLose();
    drawBoard();
}

function checkWin() {
    if (player.x === exit.x && player.y === exit.y) {
        endGame("YOU WIN! 🎉");
    }
}

function checkLose() {
    if (player.x === ghost.x && player.y === ghost.y) {
        endGame("THE GHOST GOT YOU! 👻");
    }
}

function endGame(msg) {
    clearInterval(interval);
    alert(msg);
    location.reload();
}
</script>

</body>
</html>
