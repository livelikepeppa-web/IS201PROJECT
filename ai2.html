<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day at the Races</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(#1a1a40, #0a0a1a);
    color: white;
    font-family: 'Press Start 2P', cursive;
    text-align: center;
}

h1 {
    font-size: 2.2rem;
    margin-top: 25px;
    background: linear-gradient(90deg, red, yellow, lime, cyan, magenta);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* MENU */
#menu { margin-top: 40px; }

button {
    font-family: inherit;
    padding: 10px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    background: #ffcc00;
}

/* TRACK */
#track { display: none; margin-top: 20px; }

.lane {
    width: 80%;
    height: 60px;
    margin: 10px auto;
    background: #222;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
}

.racer {
    position: absolute;
    left: 0;
    top: 10px;
    font-size: 30px;
    transition: left 0.2s linear;
}

.finish {
    position: absolute;
    right: 10px;
    top: 0;
    bottom: 0;
    width: 10px;
    background: repeating-linear-gradient(45deg, white, white 10px, black 10px, black 20px);
}

/* LIGHTS */
.light {
    display: inline-block;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    margin: 5px;
    background: gray;
}

.red { background: red; }
.yellow { background: yellow; }
.green { background: lime; }

/* RESULT + CELEBRATION */
#result {
    margin-top: 20px;
    font-size: 1.3rem;
}

#celebration {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#celebration h2 {
    font-size: 2rem;
    color: gold;
}

.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    animation: fall 2s linear infinite;
}

@keyframes fall {
    from { transform: translateY(-100vh) rotate(0deg); }
    to { transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<h1>DAY AT THE RACES</h1>

<div id="menu">
    <p>Choose your racer:</p>
    <button onclick="choose('Cheap-Cheap')">🐟 Cheap-Cheap</button>
    <button onclick="choose('Coopa')">🐢 Coopa</button>
    <button onclick="choose('Scaredy Rat')">🐀 Scaredy Rat</button>
    <button onclick="choose('Diddy')">🐒 Diddy</button>
</div>

<div id="track">
    <div class="lane"><div class="racer" id="a">🐟</div><div class="finish"></div></div>
    <div class="lane"><div class="racer" id="b">🐢</div><div class="finish"></div></div>
    <div class="lane"><div class="racer" id="c">🐀</div><div class="finish"></div></div>
    <div class="lane"><div class="racer" id="d">🐒</div><div class="finish"></div></div>
</div>

<div id="result"></div>

<!-- CELEBRATION SCREEN -->
<div id="celebration">
    <h2 id="celebrationText">YOU WIN! 🎉</h2>
    <button onclick="playAgain()">Play Again 🔁</button>
</div>

<script>
let playerChoice = "";
let positions = {a:0,b:0,c:0,d:0};
let interval;
let finished = false;

function choose(name){
    playerChoice = name;
    document.getElementById("menu").style.display = "none";
    document.getElementById("track").style.display = "block";
    trafficLights();
}

function trafficLights(){
    setTimeout(()=>document.body.style.filter="brightness(0.5)",500);
    setTimeout(()=>document.body.style.filter="brightness(1)",1500);
    setTimeout(startRace, 2000);
}

function startRace(){
    interval = setInterval(()=>{
        move("a");
        move("b");
        move("c");
        move("d");
        checkWinner();
    }, 200);
}

function move(id){
    positions[id] += Math.random() * 10;
    document.getElementById(id).style.left = positions[id] + "%";
}

function checkWinner(){
    if (finished) return;

    for (let id of ["a","b","c","d"]){
        if (positions[id] >= 85){
            finished = true;
            clearInterval(interval);
            endRace(id);
        }
    }
}

function endRace(winner){
    let names = {
        a:"Cheap-Cheap",
        b:"Coopa",
        c:"Scaredy Rat",
        d:"Diddy"
    };

    let emojis = {
        a:"🐟",
        b:"🐢",
        c:"🐀",
        d:"🐒"
    };

    document.getElementById("result").innerHTML =
        "🏁 " + names[winner] + " wins the race! 🏁";

    // PLAYER WIN CHECK
    if (names[winner] === playerChoice){
        showCelebration();
    } else {
        document.getElementById("result").innerHTML += "<br>You lost 😭";
    }
}

function showCelebration(){
    const celeb = document.getElementById("celebration");
    celeb.style.display = "flex";

    document.getElementById("celebrationText").innerText = "YOU WON! 🎉";

    // confetti
    for (let i = 0; i < 40; i++){
        let c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = ["red","yellow","blue","lime","magenta"][Math.floor(Math.random()*5)];
        c.style.animationDuration = (1 + Math.random()*2) + "s";
        document.body.appendChild(c);
    }
}

function playAgain(){
    location.reload();
}
</script>

</body>
</html>
